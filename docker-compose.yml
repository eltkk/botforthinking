version: "3.8"

services:
  bot:
    build: .
    env_file: .env
    volumes:
      - ./data:/app/data   # Папка для хранения SQLite базы данных
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-thinkbot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-thinkbot}
      POSTGRES_DB: ${POSTGRES_DB:-thinkbot}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-thinkbot}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
